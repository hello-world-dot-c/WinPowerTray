name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build-installer:
    name: Build installer & publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          VER="${TAG#v}"                    # strip leading 'v'
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WinPowerTray/WinPowerTray.csproj --runtime win-x64

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish WinPowerTray/WinPowerTray.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}.0
          -p:AssemblyVersion=${{ steps.version.outputs.version }}.0
          --output publish
          --no-restore

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: >
          iscc
          /DAppVersion=${{ steps.version.outputs.version }}
          installer\WinPowerTray.iss

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WinPowerTray ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            installer/output/WinPowerTray-${{ steps.version.outputs.version }}-Setup.exe
