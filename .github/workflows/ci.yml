name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/version-bump.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore WinPowerTray/WinPowerTray.csproj --runtime win-x64

      - name: Build (Release)
        run: dotnet build WinPowerTray/WinPowerTray.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish WinPowerTray/WinPowerTray.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish
          --no-restore
